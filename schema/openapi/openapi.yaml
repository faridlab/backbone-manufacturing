components:
  schemas:
    Workstation:
      type: object
      required:
        - id
        - company_id
        - workstation_name
        - hour_rate
        - is_active
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        workstation_name:
          type: string
          maxLength: 140
        hour_rate:
          type: string
        is_active:
          type: boolean
        metadata:
          type: object

    WorkstationBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workstation'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreateWorkstationRequest:
      type: object
      required:
        - company_id
        - workstation_name
        - hour_rate
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        workstation_name:
          type: string
          maxLength: 140
        hour_rate:
          type: string
        is_active:
          type: boolean
        metadata:
          type: object

    UpdateWorkstationRequest:
      type: object
      required:
        - company_id
        - workstation_name
        - hour_rate
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        workstation_name:
          type: string
          maxLength: 140
        hour_rate:
          type: string
        is_active:
          type: boolean
        metadata:
          type: object

    PatchWorkstationRequest:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        workstation_name:
          type: string
          maxLength: 140
        hour_rate:
          type: string
        is_active:
          type: boolean
        metadata:
          type: object

    WorkstationList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workstation'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    Operation:
      type: object
      required:
        - id
        - company_id
        - operation_name
        - is_active
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        operation_name:
          type: string
          maxLength: 140
        default_workstation_id:
          nullable: true
          type: string
          format: uuid
        is_active:
          type: boolean
        metadata:
          type: object

    OperationBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Operation'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreateOperationRequest:
      type: object
      required:
        - company_id
        - operation_name
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        operation_name:
          type: string
          maxLength: 140
        default_workstation_id:
          nullable: true
          type: string
          format: uuid
        is_active:
          type: boolean
        metadata:
          type: object

    UpdateOperationRequest:
      type: object
      required:
        - company_id
        - operation_name
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        operation_name:
          type: string
          maxLength: 140
        default_workstation_id:
          nullable: true
          type: string
          format: uuid
        is_active:
          type: boolean
        metadata:
          type: object

    PatchOperationRequest:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        operation_name:
          type: string
          maxLength: 140
        default_workstation_id:
          nullable: true
          type: string
          format: uuid
        is_active:
          type: boolean
        metadata:
          type: object

    OperationList:
      type: object
      properties:
        items:
          type: array
          items:
